<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SoundJudge — Nền tảng đánh giá âm nhạc chuyên nghiệp dành cho Artist và Reviewer." />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Open Graph (chia sẻ mạng xã hội) -->
    <meta property="og:title"       content="SoundJudge" />
    <meta property="og:description" content="Nền tảng đánh giá âm nhạc chuyên nghiệp." />
    <meta property="og:type"        content="website" />

    <!-- Favicon (dùng emoji làm icon tạm, thay bằng file .ico khi có) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>" />

    <!-- Google Fonts — preconnect trước để giảm latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <title>SoundJudge — Nền tảng đánh giá âm nhạc</title>

    <!-- Màu nền tối ngay lập tức, tránh flash trắng trước khi CSS load -->
    <style>
      html, body { background-color: #0a0a0f; margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
